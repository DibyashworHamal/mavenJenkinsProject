<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common_head :: head('Make Payment')}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="dashboard-container">
        <div th:replace="~{fragments/organizer_sidebar :: organizer_sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <h2>Step 2: Make Payment</h2>
                <p style="text-align: center; color: #6c757d; margin-bottom: 25px;">
                    Please complete the dummy payment to submit your request for admin approval.
                </p>
                <form th:action="@{/payment/make}" th:object="${paymentDto}" method="post">
                    <input type="hidden" th:field="*{requestId}" />
                    <div>
                        <label for="bankAccount">Bank Account Number (16 digits):</label>
                        <input type="text" id="bankAccount" th:field="*{bankAccountNumber}" required/>
                        <div class="error-message" th:if="${#fields.hasErrors('bankAccountNumber')}" th:errors="*{bankAccountNumber}"></div>
                    </div>
                    <div>
                        <label for="amount">Amount (Minimum Rs. 100):</label>
                        <input type="number" id="amount" th:field="*{amount}" min="100" step="0.01" required placeholder="e.g., 150.50" />
                        <div class="error-message" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                    </div>
                    <button type="submit">Submit Payment</button>
                </form>
            </div>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
     <div th:replace="~{fragments/common_scripts :: scripts}"></div>
</body>
</html>
