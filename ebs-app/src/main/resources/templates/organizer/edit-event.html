<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common_head :: head('Edit Event')}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="dashboard-container">
        <div th:replace="~{fragments/organizer_sidebar :: organizer_sidebar}"></div>
        <main class="main-content">
            <div class="container" style="max-width: 800px;">
                <h2 class="mb-4" th:text="'Edit Event: ' + ${currentEvent.title}">Edit Event</h2>
                
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/organizer/events/edit/{id}(id=${eventId})}" th:object="${eventForm}" method="post" enctype="multipart/form-data">
                    
                    <div class="mb-3">
                        <label for="eventName" class="form-label">Event Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{eventName}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('eventName')}" th:errors="*{eventName}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="eventDescription" class="form-label">Event Description <span class="text-danger">*</span></label>
                        <textarea class="form-control" th:field="*{eventDescription}" rows="5" required></textarea>
                         <div class="text-danger" th:if="${#fields.hasErrors('eventDescription')}" th:errors="*{eventDescription}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="startDateTime" class="form-label">Start Date & Time <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" th:field="*{startDateTime}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('startDateTime')}" th:errors="*{startDateTime}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="endDateTime" class="form-label">End Date & Time <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" th:field="*{endDateTime}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('endDateTime')}" th:errors="*{endDateTime}"></div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="location" class="form-label">Location <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{location}" required>
                             <div class="text-danger" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="categoryId" class="form-label">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="categoryId" th:field="*{categoryId}" required>
                                <option value="">Select category</option>
                                <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"></option>
                                <option value="-1">Other</option>
                            </select>
                            <div id="otherCategoryWrapper" class="mt-2" style="display: none;">
                                <label for="otherCategoryName" class="form-label">Specify Other Category</label>
                                <input type="text" class="form-control" id="otherCategoryName" th:field="*{otherCategoryName}">
                            </div>
                        </div>
                    </div>
                     <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="totalTickets" class="form-label">Total Tickets Available <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="totalTickets" th:field="*{totalTickets}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('totalTickets')}" th:errors="*{totalTickets}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="ticketPrice" class="form-label">Ticket Price (Rs) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="ticketPrice" th:field="*{ticketPrice}" step="0.01" required>
                             <div class="text-danger" th:if="${#fields.hasErrors('ticketPrice')}" th:errors="*{ticketPrice}"></div>
                        </div>
                    </div>

                    <!-- Image Upload Section -->
                    <div class="mb-3">
                        <label class="form-label">Current Image</label>
                        <div>
                            <img th:if="${currentEvent.coverImagePath}" th:src="${currentEvent.coverImagePath}" alt="Current Event Image" style="max-width: 200px; border-radius: 8px; border: 1px solid #ddd; padding: 5px;">
                            <span th:unless="${currentEvent.coverImagePath}" class="text-muted">No image currently uploaded.</span>
                        </div>
                        <label for="eventImage" class="form-label mt-2">Upload New Image (optional)</label>
                        <input class="form-control" type="file" id="eventImage" name="eventImage" accept="image/*">
                        <small class="form-text text-muted">Uploading a new image will replace the current one. Leave empty to keep the current image.</small>
                    </div>

                    <hr class="my-4">
                    <h5 class="mb-3">Optional Details</h5>

                     <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="organizerName" class="form-label">Organizer Name</label>
                            <input type="text" class="form-control" th:field="*{organizerName}">
                        </div>
                        <div class="col-md-6">
                            <label for="organizerContact" class="form-label">Organizer Contact</label>
                            <input type="text" class="form-control" th:field="*{organizerContact}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="eventWebsite" class="form-label">Event Website</label>
                        <input type="url" class="form-control" th:field="*{eventWebsite}">
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" th:field="*{featured}">
                        <label class="form-check-label" for="featured">Feature this event on homepage</label>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" th:field="*{registrationRequired}">
                        <label class="form-check-label" for="registrationRequired">Require registration</label>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/organizer/events/view}" class="btn btn-outline-secondary" style="width: auto; padding: 10px 30px;">Cancel</a>
                        <button type="submit" class="btn btn-primary" style="width: auto; padding: 10px 30px;">Save Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/common_scripts :: scripts}"></div>
    <!-- Script to handle the "Other" category visibility -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const categorySelect = document.getElementById('categoryId');
            const otherCategoryWrapper = document.getElementById('otherCategoryWrapper');
            const otherCategoryInput = document.getElementById('otherCategoryName');
            function toggleOtherCategory() {
                if (categorySelect.value === '-1') {
                    otherCategoryWrapper.style.display = 'block';
                    otherCategoryInput.setAttribute('required', 'required');
                } else {
                    otherCategoryWrapper.style.display = 'none';
                    otherCategoryInput.removeAttribute('required');
                }
            }
            if (categorySelect && otherCategoryWrapper) {
                categorySelect.addEventListener('change', toggleOtherCategory);
                toggleOtherCategory(); // Run on page load to check initial state
            }
        });
    </script>
</body>
</html>
