<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common_head :: head('Notifications')}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="dashboard-container">
        <div th:replace="~{fragments/organizer_sidebar :: organizer_sidebar}"></div>
        <main class="main-content">
            <h2>Notifications</h2>
            <hr>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${!notifications.isEmpty()}" style="text-align: right; margin-bottom: 20px;">
                <form th:action="@{/organizer/notifications/delete/all}" method="post" onsubmit="return confirm('Are you sure you want to clear ALL notifications?');">
                    <button type="submit" class="btn btn-secondary btn-sm">Clear All</button>
                </form>
            </div>
            <ul style="list-style: none; padding: 0;">
                <li th:if="${notifications.isEmpty()}" class="list-group-item text-center p-5">You have no notifications.</li>
                <li th:each="n : ${notifications}" class="list-group-item d-flex justify-content-between align-items-center mb-3 p-3 shadow-sm" th:classappend="${n.status == 'UNREAD'} ? 'border-start border-primary border-4' : ''">
                    <div>
                        <h5 class="mb-1" th:text="${n.title}">Notification Title</h5>
                        <p class="mb-1" th:text="${n.message}">Message content.</p>
                        <small class="text-muted" th:text="${'Received: ' + #temporals.format(n.sentAt, 'MMM dd, yyyy, h:mm a')}"></small>
                    </div>
                    <form th:action="@{/organizer/notifications/delete/{id}(id=${n.notificationId})}" method="post">
                        <button type="submit" class="btn-close" aria-label="Clear notification"></button>
                    </form>
                </li>
            </ul>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
     <div th:replace="~{fragments/common_scripts :: scripts}"></div>
</body>
</html>
