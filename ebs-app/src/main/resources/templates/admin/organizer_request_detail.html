<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
     <th:block th:replace="~{fragments/common_head :: head('Organizer Request Details')}"></th:block>
    <style>
        /* Specific styles for this page */
        .detail-grid { display: grid; grid-template-columns: 180px 1fr; gap: 15px; align-items: center; }
        .detail-grid strong { text-align: right; color: #555; }
        .document-viewer { margin-top: 30px; border: 1px solid #ccc; }
        .document-viewer iframe { width: 100%; height: 500px; border: none; }
        .action-buttons { margin-top: 30px; display: flex; gap: 15px; }
        .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none;}
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="dashboard-container">
        <div th:replace="~{fragments/admin_sidebar :: admin_sidebar}"></div>

        <main class="main-content">
            <!-- Use the centered container for the form -->
            <div class="container">
                <a th:href="@{/admin/requests}" class="back-link">← Back to Requests List</a>
                <h2>Organizer Request Details</h2>
                <hr>
                
                <div class="detail-grid">
                    <strong>Request ID:</strong>
                    <span th:text="${request.requestId}"></span>
                    
                    <strong>Applicant Name:</strong>
                    <span th:text="${request.userFullName}"></span>
                    
                    <strong>Applicant Email:</strong>
                    <span th:text="${request.userEmail}"></span>
                    
                    <strong>Business Name:</strong>
                    <span th:text="${request.businessName}"></span>
                    
                    <strong>Tax ID:</strong>
                    <span th:text="${request.taxId}"></span>
                    
                    <strong>Contact Phone:</strong>
                    <span th:text="${request.contactPhone}"></span>

                    <strong>Requested On:</strong>
                    <span th:text="${#temporals.format(request.requestedAt, 'MMM dd, yyyy')}"></span>
                    
                    <strong>Payment Status:</strong>
                    <span th:text="${request.paymentStatus}"></span>
                </div>

               <div class="document-viewer">
                    <h4>Submitted Document</h4>
                    <iframe th:src="@{/files/organizer_docs/{filename}(filename=${request.documentPath})}"></iframe>
                </div>
                
                <div class="action-buttons">
                    <form th:action="@{/admin/requests/approve/{id}(id=${request.requestId})}" method="post" onsubmit="return confirm('Are you sure you want to approve this request?');">
                        <button type="submit" class="btn btn-success">Approve</button>
                    </form>
                    <a href="#" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#rejectModal" role="button">
                      Reject
                    </a>
                </div>
            </div>
        </main>
    </div>

   <div th:replace="~{fragments/footer :: footer}"></div>
   
    <!-- Bootstrap Modal for Rejection Comments -->
    <div class="modal fade" id="rejectModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form th:action="@{/admin/requests/reject/{id}(id=${request.requestId})}" method="post">
            <div class="modal-header">
              <h5 class="modal-title">Reject Request #<span th:text="${request.requestId}"></span></h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="adminComments" class="form-label">Reason for Rejection (optional):</label>
                <textarea class="form-control" id="adminComments" name="adminComments" rows="4" placeholder="e.g., Submitted document is unclear or invalid."></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-danger">Confirm Rejection</button>
            </div>
          </form>
        </div>
      </div>
    </div>
   
    <!-- Bootstrap JS for the modal -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments/common_scripts :: scripts}"></div>
</body>
</html>
