<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Your Account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <h2>Email Verification</h2>
        <p>A 6-digit verification code has been sent to <strong th:text="${email}">your.email@example.com</strong>. Please enter it below.</p>

        <!-- Display success or error messages -->
        <div th:if="${successMessage}" class="success-message" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="error-message" style="text-align: center; margin-bottom: 15px;" th:text="${errorMessage}"></div>

        <!-- OTP Entry Form -->
        <form th:action="@{/verify-otp}" method="post">
            <input type="hidden" name="email" th:value="${email}" />
            <input type="text" name="otp" placeholder="Enter 6-Digit OTP" required autofocus maxlength="6" style="text-align: center; font-size: 1.2rem; letter-spacing: 10px;" />
            <button type="submit">Verify & Continue</button>
        </form>

        <!-- Resend OTP Form -->
        <form th:action="@{/resend-otp}" method="post" style="margin-top: 20px; text-align: center;">
            <input type="hidden" name="email" th:value="${email}" />
            <button type="submit" style="background: none; border: none; color: #3498db; text-decoration: underline; cursor: pointer; width: auto; padding: 0;">
                Didn't receive the code? Resend
            </button>
        </form>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
