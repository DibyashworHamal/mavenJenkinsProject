<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <h2>Login</h2>
        <div th:if="${param.signup_success}" class="success-message">
            Signup successful! Please log in.
        </div>
        
         <div th:if="${password_change_success}" class="success-message" th:text="${password_change_success}"></div>
         
        <form th:action="@{/doLogin}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="email" name="username" placeholder="Email" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            
            <div style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
               <a th:href="@{/forgot-password}">Forgot Password?</a>
            </div>
            
            <button type="submit">Login</button>
            <div th:if="${param.error}" class="error" style="text-align: center; margin-top: 15px;">
                Invalid email or password.
            </div>
        </form>
        <a th:href="@{/signup}" style="display: block; text-align: center; margin-top: 20px;">Don't have an account? Signup here.</a>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
