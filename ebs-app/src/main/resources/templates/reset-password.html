<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Reset Password</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <h2>Set a New Password</h2>
        <p>Create a new password for <strong th:text="${email}">your.email@example.com</strong>.</p>
        <div th:if="${errorMessage}" class="error-message" style="text-align: center;" th:text="${errorMessage}"></div>
        <form th:action="@{/reset-password}" th:object="${passwordResetRequest}" method="post">
            <input type="hidden" name="email" th:value="${email}" />
            <input type="password" th:field="*{newPassword}" placeholder="New Password" required minlength="6" maxlength="8" />
            <input type="password" th:field="*{confirmPassword}" placeholder="Confirm New Password" required />
            <button type="submit">Continue</button>
        </form>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
