<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Find Your Account</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <h2>Find Your Account</h2>
        <p>Please enter your email address to search for your account.</p>
        <div th:if="${errorMessage}" class="error-message" style="text-align: center;" th:text="${errorMessage}"></div>
        <form th:action="@{/forgot-password}" method="post">
            <input type="email" name="email" placeholder="Enter your email" required autofocus />
            <button type="submit">Find Account</button>
        </form>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
